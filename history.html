<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dompet Hasibuan - Analisis Hutan Teduh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-finance: #f4f9f4;   /* Putih kehijauan pudar super adem ala embun pagi */
            --card-bg: #ffffff;      /* Putih bersih */
            --card-inner: #e8f5e9;   /* Hijau daun muda pudar untuk kotak ringkasan */
            --emerald-money: #1b5e20; /* Hijau hutan pekat untuk angka masuk */
            --rose-expense: #b71c1c;  /* Merah buah beri hutan untuk angka keluar */
            --forest-accent: #2e7d32; /* Hijau pohon utama */
            --text-dark: #1e293b;    /* Teks utama gelap tajam */
            --text-muted: #64748b;   /* Teks sekunder kelabu */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-finance);
            color: var(--text-dark);
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        /* --- HEADER FOREST LIGHT --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #ffffff, #e8f5e9);
            border-radius: 14px;
            border: 1px solid rgba(46, 125, 50, 0.15);
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.04);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .btn-back {
            background-color: var(--card-bg);
            color: var(--text-dark);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(46, 125, 50, 0.15);
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: var(--card-inner);
        }

        /* --- SUMMARY FLOW GRID --- */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-box {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid rgba(46, 125, 50, 0.08);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.02);
        }

        .summary-box .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .summary-box .value {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
        }
        .summary-box .value.in { color: var(--emerald-money); }
        .summary-box .value.out { color: var(--rose-expense); }

        /* --- CHART CARD --- */
        .chart-card {
            background-color: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(46, 125, 50, 0.08);
            box-shadow: 0 10px 25px -5px rgba(46, 125, 50, 0.05);
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
            text-align: center;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
        }

        /* --- TRANSACTION HISTORY LIST --- */
        .transaction-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background-color: var(--card-bg);
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            border: 1px solid rgba(46, 125, 50, 0.05);
            border-left: 4px solid transparent;
        }

        .transaction-item.income { border-left-color: var(--emerald-money); }
        .transaction-item.expense { border-left-color: var(--rose-expense); }

        .item-info .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* TANGGAL TRANSAKSI DIBAWAH KETERANGAN */
        .item-info .date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-amount {
            font-size: 14px;
            font-weight: 700;
        }
        .item-amount.income { color: var(--emerald-money); }
        .item-amount.expense { color: var(--rose-expense); }

        #loading-status {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin: 30px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Analisis Histori 🌲</h1>
        <a href="index.html" class="btn-back">⬅️ Kembali</a>
    </div>

    <!-- BOX KUMULATIF -->
    <div class="summary-grid">
        <div class="summary-box">
            <div class="label">Total Semua Masuk</div>
            <div id="month-income" class="value in">Rp 0</div>
        </div>
        <div class="summary-box">
            <div class="label">Total Semua Keluar</div>
            <div id="month-expense" class="value out">Rp 0</div>
        </div>
    </div>

    <!-- GRAFIK RASIO KAS -->
    <div class="chart-card" id="chart-box" style="display: none;">
        <div class="chart-title">Rasio Struktur Cash Flow</div>
        <div class="chart-container">
            <canvas id="ratioChart"></canvas>
        </div>
    </div>

    <div id="loading-status">🔄 Mengumpulkan berkas kas dari cloud...</div>

    <!-- CONTAINER DAFTAR TRANSAKSI -->
    <ul id="transaction-list" class="transaction-list"></ul>
</div>

<script>
    // URL WEB APP SCRIPT DATABASE UTAMA ANDA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJI3zjmID6Io0Xu_TlCu3s3GFbLU6JDY1zuS-6mj_VXOOO5E9Cm77U3AE6O-X_floq/exec';

    const transactionList = document.getElementById('transaction-list');
    const loadingStatus = document.getElementById('loading-status');
    const monthIncomeEl = document.getElementById('month-income');
    const monthExpenseEl = document.getElementById('month-expense');
    const chartBox = document.getElementById('chart-box');
    
    let ratioChartInstance = null;

    function formatRupiah(angka) {
        return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
    }

    // Fungsi Format Tanggal & Waktu Lokal Indonesia (WIB)
    function formatTanggalIndo(dateString) {
        if (!dateString) return "Waktu tidak tercatat";
        const tanggalObj = new Date(dateString);
        
        // Cek jika data tanggal valid
        if (isNaN(tanggalObj.getTime())) return "Waktu tidak tercatat";

        const opsi = { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        return tanggalObj.toLocaleDateString('id-ID', opsi) + ' WIB';
    }

    function renderChart(income, expense) {
        const ctx = document.getElementById('ratioChart').getContext('2d');
        
        if (ratioChartInstance) {
            ratioChartInstance.destroy();
        }

        if (income === 0 && expense === 0) {
            chartBox.style.display = 'none';
            return;
        }

        chartBox.style.display = 'block';
        ratioChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pemasukan', 'Pengeluaran'],
                datasets: [{
                    data: [income, expense],
                    backgroundColor: ['#2e7d32', '#c62828'], // Hijau hutan vs Merah tua
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#1e293b',
                            font: { family: 'Inter', size: 12, weight: '500' }
                        }
                    }
                },
                cutout: '70%'
            }
        });
    }

    function initHistory() {
        const cacheBusterUrl = SCRIPT_URL + '?_ts=' + new Date().getTime();

        fetch(cacheBusterUrl)
        .then(response => response.json())
        .then(data => {
            loadingStatus.style.display = 'none';
            transactionList.innerHTML = '';

            if (!data || data.length === 0) {
                transactionList.innerHTML = '<li style="text-align:center; color:#64748b; font-size:13px; padding: 20px;">Belum ada riwayat transaksi ter-sinkron.</li>';
                return;
            }

            let totalIncome = 0;
            let totalExpense = 0;

            // Salin dan balik urutan data agar transaksi terbaru berada di baris teratas
            const displayData = [...data].reverse();

            displayData.forEach(transaction => {
                // Normalisasi dual-bahasa objek properti dari backend cloud
                const tipe = String(transaction.type || transaction.jenis || "").toLowerCase();
                const nominal = Number(transaction.amount || transaction.jumlah) || 0;
                const keterangan = transaction.description || transaction.keterangan || "Tanpa Keterangan";
                const waktuRiil = transaction.tanggal || new Date(); // Fallback jika tanggal kosong

                const isIncome = (tipe === 'income' || tipe === 'pemasukan');
                const sign = isIncome ? '+' : '-';
                const amountClass = isIncome ? 'income' : 'expense';

                const li = document.createElement('li');
                li.classList.add('transaction-item', amountClass);
                li.innerHTML = `
                    <div class="item-info">
                        <div class="title">${keterangan}</div>
                        <!-- PENAMBAHAN FITUR TANGGAL & WAKTU REAL-TIME -->
                        <div class="date">📅 ${formatTanggalIndo(waktuRiil)}</div>
                    </div>
                    <div class="item-amount ${amountClass}">${sign} ${formatRupiah(nominal)}</div>
                `;
                transactionList.appendChild(li);

                if (isIncome) {
                    totalIncome += nominal;
                } else {
                    totalExpense += nominal;
                }
            });

            monthIncomeEl.innerText = formatRupiah(totalIncome);
            monthExpenseEl.innerText = formatRupiah(totalExpense);

            renderChart(totalIncome, totalExpense);
        })
        .catch(error => {
            console.error('Error:', error);
            loadingStatus.innerText = '⚠️ Gagal menyinkronkan data riwayat hutan.';
        });
    }

    initHistory();
</script>

</body>
</html>
