<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dompet Hasibuan - Catatan Keuangan Realtime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-finance: #0f172a; 
            --card-bg: #1e293b;
            --emerald-money: #10b981; 
            --rose-expense: #f43f5e; 
            --gold-accent: #f59e0b; 
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-finance);
            color: var(--text-light);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- PEMBARUAN HEADER ELEGAN & MENARIK --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 14px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo {
            background: linear-gradient(135deg, var(--gold-accent), #f97316);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 16px;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.3);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-history {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--gold-accent);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(245, 158, 11, 0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-history:hover {
            background-color: rgba(245, 158, 11, 0.2);
            transform: translateY(-1px);
        }

        /* --- KODE STRUKTUR SEBELUMNYA --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin-top: 4px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--gold-accent);
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .radio-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        input[type="radio"] {
            display: none;
        }

        #typeIncome:checked + .radio-label {
            border-color: var(--emerald-money);
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--emerald-money);
        }

        #typeExpense:checked + .radio-label {
            border-color: var(--rose-expense);
            background-color: rgba(244, 63, 94, 0.1);
            color: var(--rose-expense);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold-accent), #f97316);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.2);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .recent-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 4px solid transparent;
        }

        .transaction-item.income { border-left-color: var(--emerald-money); }
        .transaction-item.expense { border-left-color: var(--rose-expense); }

        .item-desc {
            font-size: 14px;
            font-weight: 500;
        }

        .item-amount {
            font-size: 14px;
            font-weight: 600;
        }

        .item-amount.income { color: var(--emerald-money); }
        .item-amount.expense { color: var(--rose-expense); }

        #loadingStatus {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            padding: 10px 0;
        }

        #debtGroup {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
    <div class="header-brand">
        <div class="header-logo">H</div>
        <h1 style="font-size: 16px;">Dompet Hasibuan</h1>
    </div>
    <div style="display: flex; gap: 6px;">
        <a href="cicilan.html" class="btn-history" style="background-color: rgba(244,63,94,0.1); color: var(--rose-expense); border-color: rgba(244,63,94,0.2);">Cicilan 💸</a>
        <a href="history.html" class="btn-history">Analisis 📊</a>
    </div>
</div>

    <div class="card">
        <div class="balance-label">Saldo Bersih Saat Ini</div>
        <div id="netBalance" class="balance-amount">Rp 0</div>
    </div>

    <div class="card">
        <form id="financeForm">
            <div class="form-group">
                <label>Tipe Kas</label>
                <div class="radio-group">
                    <input type="radio" id="typeIncome" name="transactionType" value="income" checked>
                    <label for="typeIncome" class="radio-label">📈 Pemasukan</label>

                    <input type="radio" id="typeExpense" name="transactionType" value="expense">
                    <label for="typeExpense" class="radio-label">📉 Pengeluaran</label>
                </div>
            </div>

            <div class="form-group" id="debtGroup">
                <label>Pilih Kategori Hutang (Opsional)</label>
                <select id="debtSelect">
                    <option value="">-- Bukan Bayar Hutang (Ketik Manual) --</option>
                    <option value="HCI">Bayar Cicilan HCI (Rp 781.700)</option>
                    <option value="SPP 1">Bayar Cicilan SPP 1 (Rp 1.869.303)</option>
                    <option value="SPP 2">Bayar Cicilan SPP 2 (Rp 226.132)</option>
                    <option value="SPL">Bayar Cicilan SPL (Input Manual Sesuai Saldo Menurun)</option>
                    <option value="MKR">Bayar Cicilan MKR (Rp 500.000)</option>
                    <option value="AGS">Bayar Cicilan AGS (Rp 1.500.000)</option>
                    <option value="BPR">Bayar Cicilan BPR (Rp 2.500.000)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Keterangan Transaksi</label>
                <input type="text" id="descriptionInput" placeholder="Contoh: Belanja Sembako / Bayar Cicilan" required>
            </div>

            <div class="form-group">
                <label>Jumlah Uang (Rupiah)</label>
                <input type="tel" id="amountInput" placeholder="Rp 0" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Simpan Transaksi</button>
        </form>
    </div>

    <div>
        <div class="recent-title">5 Transaksi Terakhir (Cloud)</div>
        <div id="loadingStatus">🔄 Menyinkronkan dengan Cloud...</div>
        <div id="transactionList" class="transaction-list"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJI3zjmID6Io0Xu_TlCu3s3GFbLU6JDY1zuS-6mj_VXOOO5E9Cm77U3AE6O-X_floq/exec';
    
    let transactions = [];

    const form = document.getElementById('financeForm');
    const descriptionInput = document.getElementById('descriptionInput');
    const amountInput = document.getElementById('amountInput');
    const typeIncome = document.getElementById('typeIncome');
    const typeExpense = document.getElementById('typeExpense');
    const debtGroup = document.getElementById('debtGroup');
    const debtSelect = document.getElementById('debtSelect');
    const submitBtn = document.getElementById('submitBtn');
    const netBalance = document.getElementById('netBalance');
    const transactionList = document.getElementById('transactionList');
    const loadingStatus = document.getElementById('loadingStatus');

    typeIncome.addEventListener('change', () => { debtGroup.style.display = 'none'; debtSelect.value = ""; });
    typeExpense.addEventListener('change', () => { debtGroup.style.display = 'block'; });

    debtSelect.addEventListener('change', (e) => {
        const pilihan = e.target.value;
        if (pilihan === "") {
            descriptionInput.value = "";
            amountInput.value = "";
            return;
        }

        descriptionInput.value = "Bayar Cicilan " + pilihan;

        if (pilihan === "HCI") amountInput.value = "781.700";
        else if (pilihan === "SPP 1") amountInput.value = "1.869.303";
        else if (pilihan === "SPP 2") amountInput.value = "226.132";
        else if (pilihan === "MKR") amountInput.value = "500.000";
        else if (pilihan === "AGS") amountInput.value = "1.500.000";
        else if (pilihan === "BPR") amountInput.value = "2.500.000";
        else if (pilihan === "SPL") {
            amountInput.value = "";
        }
    });

    function formatRupiah(angka) {
        return 'Rp ' + String(angka).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    amountInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "");
        e.target.value = value ? String(value).replace(/\B(?=(\d{3})+(?!\d))/g, ".") : "";
    });

    function updateBudget() {
        let incomeTotal = 0;
        let expenseTotal = 0;
        transactions.forEach(t => {
            if (t.type === 'income') incomeTotal += t.amount;
            else expenseTotal += t.amount;
        });
        netBalance.innerText = formatRupiah(incomeTotal - expenseTotal);
    }

    function renderTransactions() {
        transactionList.innerHTML = '';
        const recent = transactions.slice(-5).reverse();
        recent.forEach(t => {
            const isIncome = t.type === 'income';
            const itemClass = isIncome ? 'income' : 'expense';
            const sign = isIncome ? '+' : '-';
            
            const div = document.createElement('div');
            div.className = `transaction-item ${itemClass}`;
            div.innerHTML = `
                <span class="item-desc">${t.description}</span>
                <span class="item-amount ${itemClass}">${sign} ${formatRupiah(t.amount)}</span>
            `;
            transactionList.appendChild(div);
        });
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const rawAmount = parseInt(amountInput.value.replace(/\D/g, "")) || 0;
        if (rawAmount <= 0) return alert('Masukkan jumlah nominal yang valid.');

        submitBtn.disabled = true;
        submitBtn.innerText = 'Mengunci & Mengirim...';

        const newTransaction = {
            description: descriptionInput.value,
            amount: rawAmount,
            type: typeExpense.checked ? 'expense' : 'income'
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(newTransaction)
        })
        .then(() => {
            descriptionInput.value = '';
            amountInput.value = '';
            debtSelect.value = '';
            init(); 
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Gagal mengirim data. Periksa jaringan internet Anda.');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Simpan Transaksi';
        });
    });

    function init() {
        const cacheBusterUrl = SCRIPT_URL + '?_ts=' + new Date().getTime();
        loadingStatus.style.display = 'block';
        loadingStatus.innerText = '🔄 Menyinkronkan dengan Cloud...';

        fetch(cacheBusterUrl)
        .then(response => response.json())
        .then(data => {
            transactions = (data && data.length > 0) ? data : [];
            loadingStatus.style.display = 'none';
            renderTransactions();
            updateBudget();
        })
        .catch(error => {
            console.error('Gagal mengambil data:', error);
            loadingStatus.innerText = '⚠️ Mode Offline. Gagal tersambung ke server.';
            renderTransactions();
            updateBudget();
        });
    }

    init();
</script>

</body>
</html>
