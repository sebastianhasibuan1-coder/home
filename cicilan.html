<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dompet Hasibuan - Kontrol Cicilan Sky Blue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-finance: #f0f7ff;   /* Biru pudar langit super adem & tenang */
            --card-bg: #ffffff;      /* Putih bersih awan */
            --card-inner: #e0f0fe;   /* Biru langit pudar tipis untuk grid info */
            --emerald-money: #0369a1; /* Biru langit pekat teduh untuk Lunas */
            --rose-expense: #be123c;  /* Merah lembut kelam untuk Belum Lunas */
            --sky-accent: #0284c7;    /* Aksen biru langit utama */
            --text-dark: #0f172a;    /* Teks utama gelap tajam */
            --text-muted: #64748b;   /* Teks sekunder kelabu */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-finance);
            color: var(--text-dark);
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        /* --- HEADER SKY BLUE LIGHT --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #ffffff, #e0f0fe);
            border-radius: 14px;
            border: 1px solid rgba(2, 132, 199, 0.15);
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.05);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .btn-back {
            background-color: var(--card-bg);
            color: var(--text-dark);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(2, 132, 199, 0.15);
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: var(--card-inner);
        }

        /* --- DASHBOARD SUMMARY CARD --- */
        .summary-card {
            background: linear-gradient(135deg, #ffffff 0%, #e0f0fe 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(2, 132, 199, 0.15);
            display: flex;
            justify-content: space-between;
            text-align: center;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.03);
        }

        .summary-box {
            flex: 1;
        }

        .summary-box:first-child {
            border-right: 1px solid rgba(2, 132, 199, 0.15);
        }

        .summary-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-val {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* --- DEBT CARD --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .debt-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(2, 132, 199, 0.08);
            box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.05);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .debt-card:hover {
            transform: translateY(-2px);
            border-color: var(--sky-accent);
        }

        .debt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .debt-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .status-badge.unpaid {
            background-color: rgba(190, 18, 60, 0.08);
            color: var(--rose-expense);
            border: 1px solid rgba(190, 18, 60, 0.15);
        }

        .status-badge.paid {
            background-color: rgba(3, 105, 161, 0.08);
            color: var(--emerald-money);
            border: 1px solid rgba(3, 105, 161, 0.15);
        }

        .grid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 12px;
            background-color: var(--card-inner);
            padding: 10px;
            border-radius: 10px;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            text-align: right;
            font-weight: 600;
        }

        .progress-bar-bg {
            background-color: #e2e8f0;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #38bdf8, var(--sky-accent));
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .click-hint {
            font-size: 11px;
            color: var(--sky-accent);
            text-align: right;
            margin-top: 6px;
            font-style: italic;
        }

        /* --- MODAL DRAWER POPUP KALENDER --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            border-top: 1px solid rgba(2, 132, 199, 0.15);
            box-shadow: 0 -10px 25px rgba(15, 23, 42, 0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--sky-accent);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .year-section {
            margin-bottom: 20px;
        }

        .year-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            padding-left: 4px;
            border-left: 3px solid var(--sky-accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .month-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 4px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .month-box.paid {
            background-color: rgba(2, 132, 199, 0.12);
            border-color: var(--sky-accent);
            color: var(--sky-accent);
            font-weight: 700;
        }

        #loadingStatus {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Kontrol Cicilan ❄️</h1>
        <a href="index.html" class="btn-back">⬅️ Menu Utama</a>
    </div>

    <div id="loadingStatus">🔄 Mengambil & mencocokkan log pembayaran cloud...</div>

    <div class="summary-card" id="summaryCard" style="display: none;">
        <div class="summary-box">
            <div class="summary-label">Total Sudah Terbayar</div>
            <div class="summary-val" id="totalPaidGlobal" style="color: var(--emerald-money);">Rp 0</div>
        </div>
        <div class="summary-box">
            <div class="summary-label">Sisa Hutang Global</div>
            <div class="summary-val" id="totalRemGlobal" style="color: var(--sky-accent);">Rp 0</div>
        </div>
    </div>

    <!-- WRAPPER DAFTAR HUTANG -->
    <div class="list-container" id="debtList"></div>
</div>

<!-- CONTAINER MODAL POPUP KALENDER -->
<div id="calendarModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalDebtName">Detail Kalender Cicilan</div>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalCalendarBody"></div>
    </div>
</div>

<script>
    // URL WEB APP APPS SCRIPT SINKRON UTAMA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJI3zjmID6Io0Xu_TlCu3s3GFbLU6JDY1zuS-6mj_VXOOO5E9Cm77U3AE6O-X_floq/exec';

    // MASTER DATA TARGET YANG SINKRON DENGAN DATA EXCEL PRIBADI
    const DEBT_MASTER = {
        "HCI":   { name: "HCI",   grandTotal: 4690200,   monthly: 781700 },
        "SPP 1": { name: "SPP 1", grandTotal: 5607909,   monthly: 1869303 },
        "SPP 2": { name: "SPP 2", grandTotal: 1130660,   monthly: 226132 },
        "SPL":   { name: "SPL",   grandTotal: 15887,     monthly: 0 }, 
        "MKR":   { name: "MKR",   grandTotal: 1500000,   monthly: 500000 },
        "AGS":   { name: "AGS",   grandTotal: 67500000,  monthly: 1500000 },
        "BPR":   { name: "BPR",   grandTotal: 107500000, monthly: 2500000 }
    };

    const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
    
    function formatRupiah(angka) {
        return 'Rp ' + Math.round(angka).toLocaleString('id-ID');
    }

    function initDebtTracker() {
        const cacheBusterUrl = SCRIPT_URL + '?_ts=' + new Date().getTime();
        const listContainer = document.getElementById('debtList');
        const loadingEl = document.getElementById('loadingStatus');
        const summaryCard = document.getElementById('summaryCard');

        fetch(cacheBusterUrl)
        .then(res => res.json())
        .then(transactions => {
            loadingEl.style.display = 'none';
            summaryCard.style.display = 'flex';
            listContainer.innerHTML = '';

            let paidTracker = { "HCI": 0, "SPP 1": 0, "SPP 2": 0, "SPL": 0, "MKR": 0, "AGS": 0, "BPR": 0 };

            transactions.forEach(t => {
                const tipeRaw = String(t.type || t.jenis || "").toLowerCase();
                
                if (tipeRaw === 'expense' || tipeRaw === 'pengeluaran' || tipeRaw === '') { 
                    const desc = String(t.description || t.keterangan || "").toUpperCase().replace(/\s+/g, ' ');
                    const nominal = Number(t.amount || t.jumlah) || 0;

                    for (let key in paidTracker) {
                        const cleanKey = key.toUpperCase().replace(/\s+/g, '');
                        const cleanDesc = desc.replace(/\s+/g, '');

                        if (cleanDesc.includes(cleanKey)) {
                            paidTracker[key] += nominal;
                        }
                    }
                }
            });

            let globalPaid = 0;
            let globalRemaining = 0;

            for (let key in DEBT_MASTER) {
                const item = DEBT_MASTER[key];
                let totalPaid = paidTracker[key];
                
                if (key !== "SPL") {
                    totalPaid = Math.min(totalPaid, item.grandTotal);
                }

                const sisa = Math.max(0, item.grandTotal - totalPaid);
                const pct = Math.min(100, Math.round((totalPaid / item.grandTotal) * 100)) || 0;
                
                globalPaid += totalPaid;
                globalRemaining += sisa;

                const isLunas = (totalPaid >= item.grandTotal && item.grandTotal > 0);
                const badgeText = isLunas ? "🟢 Lunas" : "🔴 Belum Lunas";
                const badgeClass = isLunas ? "paid" : "unpaid";

                const card = document.createElement('div');
                card.className = 'debt-card';
                card.onclick = () => openCalendarModal(key, totalPaid);
                card.innerHTML = `
                    <div class="debt-header">
                        <span class="debt-name">${item.name}</span>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="grid-info">
                        <span class="info-label">Target Total</span>
                        <span class="info-value">${formatRupiah(item.grandTotal)}</span>
                        
                        <span class="info-label">Sudah Dibayar</span>
                        <span class="info-value" style="color: var(--emerald-money);">${formatRupiah(totalPaid)}</span>
                        
                        <span class="info-label">Sisa Hutang</span>
                        <span class="info-value" style="color: ${sisa > 0 ? 'var(--rose-expense)' : 'var(--text-dark)'};">${formatRupiah(sisa)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: var(--text-muted);">
                        <span>Progress Pelunasan</span>
                        <span>${pct}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${pct}%"></div>
                    </div>
                    <div class="click-hint">Lihat Rincian Bulan 📅</div>
                `;
                listContainer.appendChild(card);
            }

            document.getElementById('totalPaidGlobal').innerText = formatRupiah(globalPaid);
            document.getElementById('totalRemGlobal').innerText = formatRupiah(globalRemaining);
        })
        .catch(err => {
            console.error(err);
            loadingEl.innerText = "⚠️ Gagal memuat data server.";
        });
    }

    // PEMETAAN JADWAL BULAN AKTIF RIIL EXCEL
    function openCalendarModal(debtKey, totalPaidRiil) {
        const item = DEBT_MASTER[debtKey];
        document.getElementById('modalDebtName').innerText = `Kalender Cicilan ${item.name}`;
        
        const body = document.getElementById('modalCalendarBody');
        body.innerHTML = '';

        let monthsPaid = 0;
        if (item.monthly > 0) {
            monthsPaid = Math.floor(totalPaidRiil / item.monthly);
        } else {
            monthsPaid = totalPaidRiil >= item.grandTotal ? 2 : Math.ceil(totalPaidRiil / 8000); 
        }

        const timeline = [2026, 2027, 2028, 2029, 2030];
        let currentPaymentIndex = 0;

        timeline.forEach(year => {
            let yearHasActiveDebt = false;
            let gridHtml = `<div class="year-section">
                                <div class="year-title">Tahun ${year}</div>
                                <div class="calendar-grid">`;

            for (let m = 1; m <= 12; m++) {
                let isDihitung = false;

                // 1. HCI: Bulan 8 2026 sd Bulan 1 2027
                if (debtKey === "HCI") {
                    if ((year === 2026 && m >= 8) || (year === 2027 && m === 1)) isDihitung = true;
                } 
                // 2. SPP 1: Bulan 8 2026 sd Bulan 10 2026
                else if (debtKey === "SPP 1") {
                    if (year === 2026 && m >= 8 && m <= 10) isDihitung = true;
                } 
                // 3. SPP 2: Bulan 8 2026 sd Bulan 12 2026
                else if (debtKey === "SPP 2") {
                    if (year === 2026 && m >= 8 && m <= 12) isDihitung = true;
                } 
                // 4. SPL: Bulan 8 2026 sd Bulan 9 2026
                else if (debtKey === "SPL") {
                    if (year === 2026 && m >= 8 && m <= 9) isDihitung = true;
                } 
                // 5. MKR: Bulan 8 2026 sd Bulan 10 2026
                else if (debtKey === "MKR") {
                    if (year === 2026 && m >= 8 && m <= 10) isDihitung = true;
                } 
                // 6. AGS: Bulan 7 2026 sd Bulan 3 2030
                else if (debtKey === "AGS") {
                    if ((year === 2026 && m >= 7) || year === 2027 || year === 2028 || year === 2029 || (year === 2030 && m <= 3)) isDihitung = true;
                } 
                // 7. BPR: Bulan 7 2026 sd Bulan 1 2030
                else if (debtKey === "BPR") {
                    if ((year === 2026 && m >= 7) || year === 2027 || year === 2028 || year === 2029 || (year === 2030 && m <= 1)) isDihitung = true;
                }

                if (isDihitung) {
                    yearHasActiveDebt = true;
                    currentPaymentIndex++;
                    
                    const isPaid = currentPaymentIndex <= monthsPaid;
                    const activeClass = isPaid ? 'paid' : '';
                    const labelText = isPaid ? `${MONTH_NAMES[m-1]} ✓` : MONTH_NAMES[m-1];

                    gridHtml += `<div class="month-box ${activeClass}">${labelText}</div>`;
                } else {
                    gridHtml += `<div class="month-box" style="opacity: 0.12; border-style: dashed; background: transparent;">${MONTH_NAMES[m-1]}</div>`;
                }
            }

            gridHtml += `</div></div>`;
            
            if (yearHasActiveDebt) {
                body.innerHTML += gridHtml;
            }
        });

        document.getElementById('calendarModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('calendarModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('calendarModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    initDebtTracker();
</script>

</body>
</html>
